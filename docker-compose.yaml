services:
  nextcloud-container:
    pull_policy: never
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        NEXTCLOUD_VERSION: ${NEXTCLOUD_VERSION:?NEXTCLOUD_VERSION must be set}
    ports:
      - "8080:80"
    container_name: nextcloud-container
    hostname: nextcloud-container
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      XDEBUG_MODE: debug,develop
      XDEBUG_CONFIG: client_host=host.docker.internal client_port=9003 idekey=VSCODE
      MYSQL_HOST: mariadb
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost 127.0.0.1 nextcloud-container      
    depends_on:
      smtp:
        condition: service_started
      mariadb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      nextcloud-network:

  mariadb:
    image: mariadb:11
    container_name: mariadb
    hostname: mariadb
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    environment:
      MARIADB_DATABASE: nextcloud
      MARIADB_USER: nextcloud
      MARIADB_PASSWORD: nextcloud
      MARIADB_ROOT_PASSWORD: rootpassword
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - nextcloud-network

  smtp:
    image: rnwood/smtp4dev:latest
    container_name: smtp
    hostname: smtp
    restart: unless-stopped
    environment:
      ServerOptions__DisableIPv6: true
    ports:
      - "8081:80"
    networks:
      - nextcloud-network

  garaged:
    image: dxflrs/garage:v2.1.0
    container_name: garaged
    hostname: garaged
    restart: unless-stopped
    volumes:
      - ./garage.toml:/etc/garage.toml
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    networks: 
      - nextcloud-network

networks:
  nextcloud-network:

volumes:
  mariadb-data:
